<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SimpleReserve 2.0 | 後慈湖管理</title>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #ef4444;
            --success: #10b981;
            --secondary: #64748b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
        }

        body { margin: 0; background: var(--bg); font-family: -apple-system, "PingFang TC", sans-serif; color: var(--text); }

        .header-bar {
            background: #ffffff; padding: 1rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
        }

        .grid { display: grid; gap: 16px; padding: 16px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }

        .card {
            background: var(--card-bg); border-radius: 16px; overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; cursor: pointer;
            position: relative; transition: transform 0.2s;
        }
        .card:active { transform: scale(0.98); }
        .card-header { padding: 16px; text-align: center; border-bottom: 1px solid #f1f5f9; }
        .batch-name { font-weight: 800; font-size: 1.2rem; color: var(--primary); }
        .card-body { padding: 16px; font-size: 15px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .info-row span { font-weight: 700; }
        .status-tag { position: absolute; top: 12px; right: 12px; font-size: 12px; padding: 4px 10px; border-radius: 20px; color: white; font-weight: bold; }

        #editOverlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(15, 23, 42, 0.6); z-index: 999; backdrop-filter: blur(4px); }
        
        #editPanel {
            position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 420px; background: #fff;
            border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); z-index: 1000; overflow: hidden;
        }
        .panel-header { background: var(--primary); color: white; padding: 15px; text-align: center; font-weight: 800; font-size: 1.2rem; }
        .panel-body { padding: 20px; }
        
        .form-line { display: flex; align-items: center; margin-bottom: 15px; }
        .form-line label { width: 90px; font-size: 16px; font-weight: 600; color: #334155; }
        
        input[type="text"], input[type="tel"], input[type="number"] {
            flex: 1; padding: 10px 14px; border: 2px solid #e2e8f0; border-radius: 10px; 
            font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--primary); }

        .time-group { display: flex; align-items: center; gap: 5px; flex: 1; }
        .time-group input { width: 55px; flex: none; text-align: center; padding: 8px 0; }

        .btn-group { display: flex; gap: 12px; margin-top: 20px; }
        button { 
            flex: 1; padding: 12px; border-radius: 10px; border: none; 
            font-weight: 700; cursor: pointer; font-size: 16px;
        }
        .btn-confirm { background: var(--primary); color: white; }
        .btn-cancel { background: #e2e8f0; color: var(--secondary); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="header-bar">
    <div style="font-weight: 900; color: var(--primary); font-size: 1.4rem;">📅 SimpleReserve 2.0</div>
    <div style="font-size: 14px;">梯次: <input type="number" id="maxBatchInput" value="8" style="width: 45px; border-radius: 5px; border:1px solid #ddd;" oninput="saveConfig()"></div>
</div>

<div class="grid" id="grid"></div>

<div id="editOverlay" onclick="closePanel()"></div>
<div id="editPanel" class="hidden">
    <div class="panel-header" id="panelTitle">梯次預約</div>
    <div class="panel-body">
        <div class="form-line">
            <label>梯次時間：</label>
            <div class="time-group">
                <input id="startH" type="number">:<input id="startM" type="number">
                <span>-</span>
                <input id="endH" type="number">:<input id="endM" type="number">
            </div>
        </div>
        
        <div class="form-line">
            <label>預約人數：</label>
            <input type="number" id="inputNum" placeholder="請輸入本次增加人數">
        </div>

        <div class="form-line">
            <label>領隊姓名：</label>
            <input type="text" id="leaderName" placeholder="姓名">
        </div>
        
        <div class="form-line">
            <label>領隊電話：</label>
            <input type="tel" id="leaderPhone" placeholder="電話">
        </div>

        <div style="font-size: 13px; color: var(--secondary); text-align: center; margin-bottom: 10px;">
            (目前已報名: <span id="currentUsedDisplay">0</span> / 總量: 50)
        </div>
        
        <div class="btn-group">
            <button class="btn-cancel" onclick="closePanel()">取消</button>
            <button class="btn-confirm" onclick="handleDataSave(true)">確定列印</button>
        </div>
    </div>
</div>

<script>
const defaultData = [
    [1,'第一梯次','08:45-09:00'], [2,'第二梯次','09:15-09:30'], [3,'第三梯次','09:45-10:00'], [4,'第四梯次','10:15-10:30'],
    [5,'第五梯次','10:45-11:00'], [6,'第六梯次','11:15-11:30'], [7,'第七梯次','12:45-13:00'], [8,'第八梯次','13:15-13:30']
];

let currentCardNo = null;

function init() {
    const dailyRecords = JSON.parse(localStorage.getItem('daily_records') || '{}');
    const savedTimes = JSON.parse(localStorage.getItem('batch_times') || '{}');
    const savedMax = localStorage.getItem('max_batch_count') || 8;
    document.getElementById('maxBatchInput').value = savedMax;

    const grid = document.getElementById('grid');
    grid.innerHTML = ''; 

    defaultData.forEach(item => {
        const id = item[0];
        const record = dailyRecords[id] || { used: 0, total: 50 };
        const time = savedTimes[id] || item[2];
        const remain = record.total - record.used;

        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.no = id;
        card.innerHTML = `
            <div class="status-tag" style="background:${remain <= 0 ? 'var(--danger)' : 'var(--success)'}">${remain <= 0 ? '已滿額' : '有空位'}</div>
            <div class="card-header">
                <div class="batch-name">${item[1]}</div>
                <div style="color:var(--secondary); font-size:13px; font-weight:600;">${time}</div>
            </div>
            <div class="card-body">
                <div class="info-row">可報名人數：<span>${record.total}</span></div>
                <div class="info-row">已報名人數：<span style="color:var(--primary)">${record.used}</span></div>
                <div class="info-row" style="color:var(--danger)">可遞補人數：<span>${Math.max(0, remain)}</span></div>
            </div>
        `;
        card.onclick = () => openEdit(id, item[1], time, record.used);
        grid.appendChild(card);
    });
    filterBatches();
}

function openEdit(id, title, timeStr, used) {
    currentCardNo = id;
    document.getElementById('editPanel').classList.remove('hidden');
    document.getElementById('editOverlay').style.display = 'block';
    document.getElementById('panelTitle').innerText = title;
    
    const times = timeStr.split('-');
    const start = times[0].split(':');
    const end = times[1].split(':');
    document.getElementById('startH').value = start[0];
    document.getElementById('startM').value = start[1];
    document.getElementById('endH').value = end[0];
    document.getElementById('endM').value = end[1];

    document.getElementById('currentUsedDisplay').innerText = used;
    document.getElementById('inputNum').value = ""; // 清空輸入框
    document.getElementById('leaderName').value = ""; 
    document.getElementById('leaderPhone').value = "";
}

function handleDataSave(shouldPrint) {
    const id = currentCardNo;
    const addedNum = parseInt(document.getElementById('inputNum').value) || 0;
    const name = document.getElementById('leaderName').value;
    const phone = document.getElementById('leaderPhone').value;
    const timeText = `${document.getElementById('startH').value.toString().padStart(2,'0')}:${document.getElementById('startM').value.toString().padStart(2,'0')}-${document.getElementById('endH').value.toString().padStart(2,'0')}:${document.getElementById('endM').value.toString().padStart(2,'0')}`;

    const dailyRecords = JSON.parse(localStorage.getItem('daily_records') || '{}');
    const record = dailyRecords[id] || { used: 0, total: 50 };
    
    // 【核心修正】將輸入的人數累加到已報名人數中
    record.used += addedNum; 
    dailyRecords[id] = record;
    localStorage.setItem('daily_records', JSON.stringify(dailyRecords));

    const savedTimes = JSON.parse(localStorage.getItem('batch_times') || '{}');
    savedTimes[id] = timeText;
    localStorage.setItem('batch_times', JSON.stringify(savedTimes));

    if (shouldPrint && addedNum > 0) { 
        printTicket(timeText, name, phone, addedNum); 
    }
    
    init(); 
    closePanel();
}

function printTicket(time, name, phone, used) {
    const today = new Date();
    const dateStr = `${today.getFullYear()}/${today.getMonth() + 1}/${today.getDate()}`;
    const printWin = window.open('', '', 'width=450,height=800');
    
    const ticketHtml = (type) => `
        <div style="width: 72mm; margin: 0 auto; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; padding: 10px; text-align: center; color: #000;">
            <h1 style="font-size: 24px; margin: 0;">後慈湖預約單</h1>
            <h2 style="font-size: 20px; margin: 5px 0 15px 0;">(${type})</h2>
            <p style="font-size: 16px; font-weight: bold; margin: 10px 0; border:1px solid #000; display:inline-block; padding:2px 10px;">現場遞補</p>
            <table style="width: 100%; border-collapse: collapse; border: 2px solid black; font-size: 18px; text-align: left;">
                <tr><th style="border: 1px solid black; padding: 10px 5px; width: 30%; background-color: #f2f2f2; text-align: center;">日期</th><td style="border: 1px solid black; padding: 10px 10px; font-weight: bold;">${dateStr}</td></tr>
                <tr><th style="border: 1px solid black; padding: 10px 5px; background-color: #f2f2f2; text-align: center;">時間</th><td style="border: 1px solid black; padding: 10px 10px; font-weight: bold;">${time}</td></tr>
                <tr><th style="border: 1px solid black; padding: 10px 5px; background-color: #f2f2f2; text-align: center;">姓名</th><td style="border: 1px solid black; padding: 10px 10px;">${name || '__________'}</td></tr>
                <tr><th style="border: 1px solid black; padding: 10px 5px; background-color: #f2f2f2; text-align: center;">電話</th><td style="border: 1px solid black; padding: 10px 10px;">${phone || '__________'}</td></tr>
                <tr><th style="border: 1px solid black; padding: 10px 5px; background-color: #f2f2f2; text-align: center;">人數</th><td style="border: 1px solid black; padding: 10px 10px; font-weight: 900; font-size: 22px;">${used} 人</td></tr>
            </table>
            <div style="text-align: left; font-size: 13px; margin-top: 15px; line-height: 1.6;">
                1. 如有符合入園相關優惠者，一人代表收集證件(身分證、志工榮譽卡、身心障礙手冊等)。<br>
                2. 導覽服務站電話：03-3889554。<br>
                ※請依照上方時間區間報到，謝謝配合！
            </div>
        </div>
    `;

    printWin.document.write(`
        <html><body style="margin:0;" onload="window.print(); setTimeout(() => window.close(), 500);">
            ${ticketHtml('遊客執據')}
            <div style="border-top: 2px dashed #000; margin: 30px 0; width: 100%;"></div>
            ${ticketHtml('站端留存')}
            <div style="height: 30mm;"></div>
        </body></html>
    `);
    printWin.document.close();
}

init();
</script>
</body>
</html>
